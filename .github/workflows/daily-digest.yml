name: Daily arXiv Digest

on:
  schedule:
    # JST 8:00 = UTC 23:00 (前日)
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      relevance_threshold:
        description: "この実行だけ通知閾値を上書きする(空欄なら通常設定を使用)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          # 通知閾値。手動実行の入力 > リポジトリ変数 > 既定値8 の順に優先。
          RELEVANCE_THRESHOLD: ${{ inputs.relevance_threshold || vars.RELEVANCE_THRESHOLD || '8' }}
        run: python scripts/daily_digest.py

      - name: Commit updated sent_ids.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sent_ids.json
          git diff --quiet --cached || git commit -m "chore: update sent_ids.json [skip ci]"
          git push
